version: "3"

# 本地开发用：起一个 Directus + Postgres，音频和图片存到本地 ./uploads
# 生产在 Railway 上通过各自服务注入环境变量，不用这个 compose

services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
      POSTGRES_DB: directus
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  cache:
    image: redis:7-alpine
    restart: unless-stopped

  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - "8055:8055"
    depends_on:
      - database
      - cache
    environment:
      KEY: "local-dev-key-change-me"
      SECRET: "local-dev-secret-change-me"

      ADMIN_EMAIL: admin@erbian.fm
      ADMIN_PASSWORD: admin123

      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: directus

      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      REDIS: "redis://cache:6379"

      # 本地存本地磁盘；生产用 R2 (见 .env.example)
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_DRIVER: local
      STORAGE_LOCAL_ROOT: ./uploads

      PUBLIC_URL: "http://localhost:8055"

      # 跨域：允许前端（dev 和 GitHub Pages）访问
      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:5173,https://tsaijack520-png.github.io"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
      - ./snapshots:/directus/snapshots
